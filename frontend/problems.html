<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Problem — CodeJudge</title>

    <!-- CodeMirror — code editor library -->
    <link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.css"/>
    <link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/theme/dracula.min.css"/>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
        }

        nav {
            background: #16213e;
            padding: 16px 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 2px solid #0f3460;
        }
        nav h1 {
            font-size: 22px;
            color: #e94560;
            font-weight: 700;
            cursor: pointer;
        }
        nav a {
            color: #58a6ff;
            text-decoration: none;
            font-size: 14px;
        }

        /* ── layout: left panel + right panel ── */
        .layout {
            display: grid;
            grid-template-columns: 1fr 1fr;
            height: calc(100vh - 57px);
        }

        /* ── left: problem description ── */
        .problem-panel {
            padding: 30px;
            overflow-y: auto;
            border-right: 2px solid #0f3460;
        }

        .problem-header {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 20px;
        }

        .problem-title {
            font-size: 22px;
            font-weight: 700;
            color: #fff;
        }

        .difficulty {
            font-size: 12px;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 20px;
        }
        .Easy   { background: #1a4a2a; color: #4caf50; }
        .Medium { background: #4a3a1a; color: #ff9800; }
        .Hard   { background: #4a1a1a; color: #f44336; }

        .section-title {
            font-size: 13px;
            font-weight: 600;
            color: #aaa;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 10px;
            margin-top: 24px;
        }

        .description {
            font-size: 15px;
            line-height: 1.7;
            color: #ccc;
        }

        .example-box {
            background: #0f3460;
            border-radius: 8px;
            padding: 14px 16px;
            margin-bottom: 12px;
            font-size: 13px;
        }
        .example-box .label {
            color: #aaa;
            font-size: 11px;
            text-transform: uppercase;
            margin-bottom: 4px;
        }
        .example-box pre {
            color: #e2e8f0;
            font-family: monospace;
            white-space: pre-wrap;
        }

        .constraints {
            font-size: 13px;
            color: #aaa;
            line-height: 1.8;
        }

        /* ── right: editor + submit ── */
        .editor-panel {
            display: flex;
            flex-direction: column;
        }

        .editor-toolbar {
            background: #16213e;
            padding: 10px 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid #0f3460;
        }
        .editor-toolbar span {
            font-size: 13px;
            color: #aaa;
        }

        /* CodeMirror fills the editor area */
        .CodeMirror {
            height: calc(100vh - 57px - 44px - 60px);
            font-size: 14px;
            font-family: 'Consolas', monospace;
        }

        .submit-bar {
            background: #16213e;
            padding: 12px 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            border-top: 1px solid #0f3460;
        }

        .btn-submit {
            background: #e94560;
            color: #fff;
            border: none;
            padding: 10px 28px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }
        .btn-submit:hover    { background: #c73652; }
        .btn-submit:disabled {
            background: #555;
            cursor: not-allowed;
        }

        .status-msg {
            font-size: 13px;
            color: #aaa;
        }

        /* ── verdict box ── */
        .verdict-box {
            display: none;
            margin: 0 16px 12px;
            padding: 14px 16px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
        }
        .verdict-accepted {
            background: #1a4a2a;
            color: #4caf50;
            border: 1px solid #4caf50;
        }
        .verdict-wrong {
            background: #4a1a1a;
            color: #f44336;
            border: 1px solid #f44336;
        }
        .verdict-tle {
            background: #4a3a1a;
            color: #ff9800;
            border: 1px solid #ff9800;
        }
        .verdict-ce {
            background: #2a1a4a;
            color: #9c27b0;
            border: 1px solid #9c27b0;
        }

        .loading {
            text-align: center;
            padding: 40px;
            color: #aaa;
        }
    </style>
</head>
<body>

<nav>
    <h1 onclick="window.location.href='index.html'">
        ⚡ CodeJudge
    </h1>
    <a href="index.html">← Back to Problems</a>
</nav>

<div class="layout">

    <!-- left panel: problem description -->
    <div class="problem-panel" id="problem-panel">
        <div class="loading">Loading problem...</div>
    </div>

    <!-- right panel: code editor -->
    <div class="editor-panel">

        <div class="editor-toolbar">
            <span>C++ (g++)</span>
            <span id="time-limit">Time limit: 2s</span>
        </div>

        <textarea id="code-editor"></textarea>

        <!-- verdict shows here -->
        <div class="verdict-box" id="verdict-box"></div>

        <div class="submit-bar">
            <button class="btn-submit"
                    id="submit-btn"
                    onclick="submitCode()">
                Submit
            </button>
            <span class="status-msg" id="status-msg"></span>
        </div>

    </div>
</div>

<!-- CodeMirror scripts -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/codemirror.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/codemirror/5.65.16/mode/clike/clike.min.js"></script>

<script>
    // ── get problem id from URL ───────────────────────────
    const params    = new URLSearchParams(window.location.search);
    const problemId = params.get('id');

    // ── setup CodeMirror editor ───────────────────────────
    const editor = CodeMirror.fromTextArea(
        document.getElementById('code-editor'), {
        mode:        'text/x-c++src',
        theme:       'dracula',
        lineNumbers: true,
        indentUnit:  4,
        tabSize:     4,
        indentWithTabs: false,
        autofocus:   true
    });

    // default starter code
    editor.setValue(
`#include<iostream>
using namespace std;

int main(){
    // write your solution here
    
    return 0;
}`
    );

    // ── load problem from server ──────────────────────────
    fetch(`http://localhost:8000/problem?id=${problemId}`)
        .then(r => r.json())
        .then(p => {
            document.title = p.title + ' — CodeJudge';
            document.getElementById('time-limit').textContent =
                `Time limit: ${p.time_limit}s | Memory: 256MB`;

            // build examples HTML
            let examplesHtml = '';
            p.examples.forEach((ex, i) => {
                examplesHtml += `
                    <div class="example-box">
                        <div class="label">
                            Example ${i + 1} — Input
                        </div>
                        <pre>${ex.input}</pre>
                    </div>
                    <div class="example-box">
                        <div class="label">
                            Example ${i + 1} — Output
                        </div>
                        <pre>${ex.output}</pre>
                    </div>
                `;
            });

            document.getElementById('problem-panel').innerHTML = `
                <div class="problem-header">
                    <span class="problem-title">
                        ${p.id}. ${p.title}
                    </span>
                    <span class="difficulty ${p.difficulty}">
                        ${p.difficulty}
                    </span>
                </div>

                <div class="section-title">Description</div>
                <div class="description">${p.description}</div>

                <div class="section-title">Examples</div>
                ${examplesHtml}

                <div class="section-title">Constraints</div>
                <div class="constraints">
                    Time Limit: ${p.time_limit} seconds<br>
                    Memory Limit: 256 MB
                </div>
            `;
        })
        .catch(() => {
            document.getElementById('problem-panel').innerHTML =
                '<div class="loading">Failed to load problem.</div>';
        });

    // ── submit code ───────────────────────────────────────
    function submitCode() {
        const code = editor.getValue().trim();
        if(!code) {
            alert('Please write some code first.');
            return;
        }

        // disable button while judging
        const btn = document.getElementById('submit-btn');
        const msg = document.getElementById('status-msg');
        const box = document.getElementById('verdict-box');

        btn.disabled    = true;
        btn.textContent = 'Submitting...';
        msg.textContent = 'Sending to judge...';
        box.style.display = 'none';

        // send code to Python server
        fetch('http://localhost:8000/submit', {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({
                problem_id: parseInt(problemId),
                code:       code
            })
        })
        .then(r => r.json())
        .then(data => {
            const queueId = data.queue_id;
            msg.textContent = 'In queue... waiting for judge';

            // poll for verdict every second
            const interval = setInterval(() => {
                fetch(
                  `http://localhost:8000/verdict?id=${queueId}`
                )
                .then(r => r.json())
                .then(v => {
                    if(v.status === 'done') {
                        clearInterval(interval);
                        showVerdict(v.verdict);
                        btn.disabled    = false;
                        btn.textContent = 'Submit';
                        msg.textContent = '';
                    }
                });
            }, 1000);
        })
        .catch(() => {
            msg.textContent = 'Error connecting to server.';
            btn.disabled    = false;
            btn.textContent = 'Submit';
        });
    }

    // ── show verdict ──────────────────────────────────────
    function showVerdict(verdict) {
        const box = document.getElementById('verdict-box');
        box.style.display = 'block';

        if(verdict === 'Accepted') {
            box.className = 'verdict-box verdict-accepted';
            box.innerHTML = '✅ Accepted — All test cases passed!';
        }
        else if(verdict.startsWith('Wrong Answer')) {
            box.className = 'verdict-box verdict-wrong';
            box.innerHTML = '❌ ' + verdict;
        }
        else if(verdict.startsWith('Time Limit')) {
            box.className = 'verdict-box verdict-tle';
            box.innerHTML = '⏱️ Time Limit Exceeded';
        }
        else if(verdict.startsWith('Memory Limit')) {
            box.className = 'verdict-box verdict-tle';
            box.innerHTML = '💾 Memory Limit Exceeded';
        }
        else if(verdict.startsWith('Compilation Error')) {
            box.className = 'verdict-box verdict-ce';
            box.innerHTML = '<pre style="white-space:pre-wrap;font-size:12px">'
                          + verdict + '</pre>';
        }
        else {
            box.className = 'verdict-box verdict-wrong';
            box.innerHTML = verdict;
        }

        // scroll verdict into view
        box.scrollIntoView({ behavior: 'smooth' });
    }
</script>

</body>
</html>
